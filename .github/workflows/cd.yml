name: CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-images:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: users-service
            image: assetflow-users-service
          - service: assets-service
            image: assetflow-assets-service
          - service: tickets-service
            image: assetflow-tickets-service
          - service: gateway-service
            image: assetflow-gateway-service
          - service: frontend-service
            image: assetflow-frontend-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image namespace
        id: prep
        shell: bash
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.prep.outputs.sha_short }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
