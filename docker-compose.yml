services:
  postgres:
    image: postgres:16-alpine
    container_name: assetflow-postgres
    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - assetflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assetflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  assetflow:
    build:
      context: .
    container_name: assetflow-web
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: assetflow
      JWT_SECRET: assetflow-secret
      DISABLE_RABBITMQ: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  assetflow_db_data:
