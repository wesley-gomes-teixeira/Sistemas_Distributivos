services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: assetflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  users-db:
    image: postgres:16-alpine
    container_name: assetflow-users-db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  users-service:
    build:
      context: ./users-service
    container_name: assetflow-users-service
    environment:
      PORT: 3001
      DB_HOST: users-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: users_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3001:3001"
    depends_on:
      users-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  assets-db:
    image: postgres:16-alpine
    container_name: assetflow-assets-db
    environment:
      POSTGRES_DB: assets_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - assets_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  assets-service:
    build:
      context: ./assets-service
    container_name: assetflow-assets-service
    environment:
      PORT: 3002
      DB_HOST: assets-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: assets_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3002:3002"
    depends_on:
      assets-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  tickets-db:
    image: postgres:16-alpine
    container_name: assetflow-tickets-db
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - tickets_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tickets-service:
    build:
      context: ./tickets-service
    container_name: assetflow-tickets-service
    environment:
      PORT: 3003
      DB_HOST: tickets-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tickets_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3003:3003"
    depends_on:
      tickets-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  gateway-service:
    build:
      context: ./gateway-service
    container_name: assetflow-gateway-service
    environment:
      PORT: 3000
      JWT_SECRET: assetflow-secret
      USERS_SERVICE_URL: http://users-service:3001
      ASSETS_SERVICE_URL: http://assets-service:3002
      TICKETS_SERVICE_URL: http://tickets-service:3003
    ports:
      - "3000:3000"
    depends_on:
      users-service:
        condition: service_healthy
      assets-service:
        condition: service_healthy
      tickets-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend-service:
    build:
      context: ./frontend-service
    container_name: assetflow-frontend-service
    environment:
      PORT: 8080
      REACT_APP_API_URL: http://gateway-service:3000
      API_URL: http://gateway-service:3000
    ports:
      - "8080:8080"
    depends_on:
      gateway-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  adminer-service:
    image: adminer:4.8.1
    container_name: assetflow-adminer-service
    ports:
      - "8081:8080"
    depends_on:
      - users-db
      - assets-db
      - tickets-db
    restart: unless-stopped

volumes:
  users_data:
  assets_data:
  tickets_data:
